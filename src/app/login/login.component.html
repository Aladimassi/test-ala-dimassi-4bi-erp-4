<div class="container mt-5 mb-5">
    <h1 class="text-center">Se Connecter</h1>
    <div>
        <!--
            En dehors de la balise <form>
            <input type="text" name="test" id="test" [formControl]="test">-->
        <form  [formGroup]="loginForm" (ngSubmit)="onSubmit()">
            <div class="mb-3">
                <label for="exampleInputEmail1" class="form-label">Email address</label>
                <input type="email" class="form-control" formControlName="email" id="exampleInputEmail1" aria-describedby="emailHelp">
                <div class="alert alert-danger m-2" *ngIf="email?.errors?.['required'] && (email?.touched || email?.dirty)">Email obligatoire</div>
                <div class="alert alert-danger m-2" *ngIf="email?.errors?.['email'] && (email?.touched || email?.dirty)">Email doit avoir le format email..</div>
            </div>
            <div class="mb-3">
                <label for="exampleInputPassword1" class="form-label">Password</label>
                <input type="password" class="form-control" formControlName="password" id="exampleInputPassword1">
                <div class="alert alert-danger m-2" *ngIf="password?.errors?.['required'] && (password?.touched || password?.dirty)">Mot de passe obligatoire</div>
                <div class="alert alert-danger m-2" *ngIf="password?.errors?.['minlength'] && (password?.touched || password?.dirty)">Mot de passe doit avoir au moins 2 caractères.</div>
            </div>
            <button type="submit" [disabled]="loginForm.invalid" class="btn btn-primary">Submit</button>
            </form>
    </div>
</div>
