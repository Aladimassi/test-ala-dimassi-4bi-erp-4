<div class="container mt-5 mb-5">
    <h1 class="text-center">Modifier un Jardin - Ala Dimassi</h1>
    
    <!-- Message de chargement -->
    <div class="alert alert-info text-center" *ngIf="!jardinForm">
        <div class="spinner-border" role="status">
            <span class="visually-hidden">Chargement...</span>
        </div>
        <p class="mt-2">Chargement des données du jardin...</p>
    </div>
    
    <div class="card p-2 bg-light" *ngIf="jardinForm">
        <form [formGroup]="jardinForm" (ngSubmit)="submitJardinForm()">
            <div class="mb-3">
                <label for="adresse" class="form-label">Adresse : </label>
                <input type="text" class="form-control" formControlName="adresse" placeholder="Entrer l'adresse du jardin" id="adresse">
                <div class="alert alert-danger m-2" *ngIf="adresse?.errors?.['required'] && (adresse?.touched || adresse?.dirty)">
                    L'adresse est requise.
                </div>
                <div class="alert alert-danger m-2" *ngIf="adresse?.errors?.['minlength'] && (adresse?.touched || adresse?.dirty)">
                    L'adresse doit comporter au moins 5 caractères.
                </div>
            </div>
            <div class="mb-3">
                <label for="surface" class="form-label">Surface (m²) : </label>
                <input type="number" class="form-control" formControlName="surface" placeholder="Entrer la surface du jardin" id="surface">
                <div class="alert alert-danger m-2" *ngIf="surface?.errors?.['required'] && (surface?.touched || surface?.dirty)">
                    La surface est requise.
                </div>
                <div class="alert alert-danger m-2" *ngIf="surface?.errors?.['min'] && (surface?.touched || surface?.dirty)">
                    La surface doit être d'au moins 50 m².
                </div>
            </div>
            <div class="mb-3">
                <label for="dateEntretien" class="form-label">Date d'entretien : </label>
                <input type="date" class="form-control" formControlName="dateEntretien" id="dateEntretien">
                <div class="alert alert-danger m-2" *ngIf="dateEntretien?.errors?.['required'] && (dateEntretien?.touched || dateEntretien?.dirty)">
                    La date d'entretien est requise.
                </div>
            </div>
            <div class="mb-3">
                <label for="statut" class="form-label">Statut : </label>
                <select class="form-select" id="statut" formControlName="statut">
                    <option [value]="true">Actif</option>
                    <option [value]="false">Inactif</option>
                </select>
            </div>
            <button type="submit" [disabled]="jardinForm.invalid" class="btn btn-primary">Mettre à jour</button>
            <a routerLink="/jardin/list" class="btn btn-secondary ms-2">Annuler</a>
        </form>
    </div>
</div>
