<div class="container mt-5 mb-5">
    <h1 class="text-center">Détails du Jardin - Ala Dimassi</h1>
    <div class="card p-4 bg-light" *ngIf="jardin">
        <div class="row mb-3">
            <div class="col-md-4"><strong>ID:</strong></div>
            <div class="col-md-8">{{ jardin.id }}</div>
        </div>
        <div class="row mb-3">
            <div class="col-md-4"><strong>Adresse:</strong></div>
            <div class="col-md-8">{{ jardin.adresse }}</div>
        </div>
        <div class="row mb-3">
            <div class="col-md-4"><strong>Surface:</strong></div>
            <div class="col-md-8">{{ jardin.surface }} m²</div>
        </div>
        <div class="row mb-3">
            <div class="col-md-4"><strong>Date d'entretien:</strong></div>
            <div class="col-md-8">{{ jardin.dateEntretien | date:'dd MMMM yyyy' }}</div>
        </div>
        <div class="row mb-3">
            <div class="col-md-4"><strong>Statut:</strong></div>
            <div class="col-md-8">
                <span *ngIf="jardin.statut" class="badge text-bg-success">Actif</span>
                <span *ngIf="!jardin.statut" class="badge text-bg-danger">Inactif</span>
            </div>
        </div>
        <div class="mt-4">
            <button (click)="returnToList()" class="btn btn-secondary">
                <i class="bi bi-arrow-left"></i> Retour à la liste
            </button>
            <a [routerLink]="['/jardin/update/', jardin.id]" class="btn btn-warning text-white ms-2">
                <i class="bi bi-pencil-square"></i> Modifier
            </a>
        </div>
    </div>
</div>
